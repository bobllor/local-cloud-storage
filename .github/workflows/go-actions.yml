on:
  push:
    paths:
      - "**.go"
  pull_request:
    branches:
      - main
      - 'dev/**'
    paths:
      - "**.go"
    workflow_dispatch:
  
jobs:
  go-testing:
    name: Go testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.24'
      - name: Test database setup (MYSQL)
        run: make start-testdb
      - name: Go setup
        run: go mod download
      - name: Go test
        run: go test ./...